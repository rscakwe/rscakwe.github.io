<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Reza Saputra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 Free CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        referrerpolicy="no-referrer" />
</head>

<body class="bg-red-50 text-gray-800">

    <!-- Header -->
    <header class="bg-red-400 text-white py-24 text-center">
        <h1 id="name" class="text-5xl font-light mb-2"></h1>
        <p id="role" class="text-xl font-light"></p>
    </header>

    <!-- Navbar -->
    <nav class="bg-red-600">
        <div class="max-w-6xl mx-auto px-6">
            <ul class="flex justify-center space-x-8 py-4">
                <li><a href="#about" class="text-white hover:text-red-200">Tentang Saya</a></li>
                <li><a href="#skills-section" class="text-white hover:text-red-200">Skills</a></li>
                <li><a href="#projects" class="text-white hover:text-red-200">Proyek</a></li>
                <li><a href="#contact" class="text-white hover:text-red-200">Kontak</a></li>
            </ul>
        </div>
    </nav>

    <!-- Tentang Saya -->
    <section id="about" class="w-full py-16 px-6 bg-red-100">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-semibold mb-6 text-center text-red-700">Tentang Saya</h2>
            <p id="about-text" class="text-lg leading-relaxed text-center mb-6 text-red-800"></p>

            <h3 class="text-2xl font-semibold mb-4 text-red-700">Pengalaman</h3>
            <div id="experience" class="space-y-4 mb-8"></div>

            <h3 class="text-2xl font-semibold mb-4 text-red-700">Pendidikan</h3>
            <div id="education" class="space-y-4"></div>
        </div>
    </section>

    <!-- Skills -->
    <section id="skills-section" class="w-full py-16 px-6 bg-red-50">
        <div class="max-w-6xl mx-auto">
            <h3 class="text-2xl font-semibold mt-8 mb-4 text-center text-red-700">Skills</h3>
            <div id="skills-container" class="flex flex-wrap justify-center gap-4"></div>
        </div>
    </section>

    <!-- Proyek -->
    <section id="projects" class="w-full py-16 px-6 bg-red-100">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-semibold mb-10 text-center text-red-700">Proyek Saya</h2>
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </div>
    </section>

    <!-- Kontak -->
    <section id="contact" class="w-full py-16 px-6 bg-red-50">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-semibold mb-6 text-center text-red-700">Kontak</h2>
            <p class="text-center mb-6 text-red-800">Hubungi saya melalui email atau media sosial:</p>
            <div id="contact-links" class="flex justify-center flex-wrap gap-8 text-4xl"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-red-200 text-red-800 text-center py-8">
        &copy; 2026 <span id="footer-name"></span>. Semua hak dilindungi.
    </footer>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                // Header
                document.getElementById('name').textContent = data.name;
                document.getElementById('role').textContent = data.role;
                document.getElementById('footer-name').textContent = data.name;

                // About
                document.getElementById('about-text').textContent = data.about;

                // Experience
                const expContainer = document.getElementById('experience');
                data.experience.forEach(exp => {
                    const div = document.createElement('div');
                    div.className = 'bg-white p-4 rounded shadow-sm';
                    div.innerHTML = `
                        <h4 class="font-semibold text-red-700">${exp.position} - ${exp.company}</h4>
                        <p class="text-gray-700 italic">${exp.period}</p>
                        <p class="text-gray-800 mt-1">${exp.description}</p>
                    `;
                    expContainer.appendChild(div);
                });

                // Education
                const eduContainer = document.getElementById('education');
                data.education.forEach(edu => {
                    const div = document.createElement('div');
                    div.className = 'bg-white p-4 rounded shadow-sm';
                    div.innerHTML = `
                        <h4 class="font-semibold text-red-700">${edu.degree}</h4>
                        <p class="text-gray-700">${edu.institution}</p>
                        <p class="text-gray-800 italic">${edu.period}</p>
                    `;
                    eduContainer.appendChild(div);
                });

                // Skills
                const skillsContainer = document.getElementById('skills-container');
                for (const category in data.skills) {
                    data.skills[category].forEach(skill => {
                        const span = document.createElement('span');
                        span.className = 'bg-red-200 text-red-800 px-4 py-2 rounded-full text-sm';
                        span.textContent = `${skill} (${category})`;
                        skillsContainer.appendChild(span);
                    });
                }

                // Projects
                const projectsContainer = document.getElementById('projects-container');
                data.projects.forEach(project => {
                    const div = document.createElement('div');
                    div.className = 'bg-white rounded-lg p-6 flex flex-col items-center text-center shadow-sm hover:shadow-lg transition';
                    div.innerHTML = `
                        <i class="${project.icon} text-red-400 text-4xl mb-4"></i>
                        <h3 class="font-semibold text-xl mb-2">${project.title}</h3>
                        <p class="text-gray-700 mb-4">${project.description}</p>
                        <a href="${project.link}" class="inline-block bg-red-400 text-white px-6 py-2 rounded-full hover:bg-red-500 transition">Lihat Proyek</a>
                    `;
                    projectsContainer.appendChild(div);
                });

                // Contact
                const contactContainer = document.getElementById('contact-links');
                const contactIcons = {
                    email: { icon: 'fas fa-envelope', color: 'text-red-400 hover:text-red-600', name: 'Email' },
                    linkedin: { icon: 'fab fa-linkedin', color: 'text-blue-500 hover:text-blue-700', name: 'LinkedIn' },
                    twitter: { icon: 'fab fa-twitter', color: 'text-blue-400 hover:text-blue-600', name: 'Twitter' },
                    github: { icon: 'fab fa-github', color: 'text-gray-800 hover:text-gray-600', name: 'GitHub' }
                };

                for (const key in data.contact) {
                    const a = document.createElement('a');
                    a.href = key === 'email' ? `mailto:${data.contact[key]}` : data.contact[key];
                    a.target = "_blank";
                    a.rel = "noopener noreferrer";
                    a.className = `relative group transition transform hover:scale-110 ${contactIcons[key].color}`;

                    // Tooltip
                    const tooltip = document.createElement('span');
                    tooltip.className = 'absolute -top-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none';
                    tooltip.textContent = contactIcons[key].name;

                    a.innerHTML = `<i class="${contactIcons[key].icon}"></i>`;
                    a.appendChild(tooltip);
                    contactContainer.appendChild(a);
                }

            })
            .catch(error => console.error('Error loading data.json:', error));
    </script>

</body>

</html>
