<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-4 bg-white shadow-md">
        <h1 class="text-xl font-bold text-gray-800">Tambah Konten</h1>
        <p class="text-sm text-gray-500">Isi form berikut untuk menambahkan konten baru</p>
    </header>

    <!-- Form Add -->
    <main class="flex-1 p-4 overflow-y-auto">
        <form class="space-y-4">

            <!-- Judul Konten -->
            <div>
                <label class="block text-gray-700 mb-1" for="title">Judul</label>
                <input type="text" id="title" placeholder="Masukkan judul"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Deskripsi Konten -->
            <div>
                <label class="block text-gray-700 mb-1" for="description">Deskripsi</label>
                <textarea id="description" placeholder="Masukkan deskripsi"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 h-24"></textarea>
            </div>

            <!-- Upload File -->
            <div>
                <label class="block text-gray-700 mb-1" for="file">Upload File</label>
                <input type="file" id="file" class="w-full text-gray-700" />
            </div>

            <!-- Kategori Konten -->
            <div>
                <label class="block text-gray-700 mb-1" for="category">Kategori</label>
                <select id="category"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Pilih kategori</option>
                    <option value="sekolah">Sekolah</option>
                    <option value="kelas">Kelas</option>
                    <option value="kurikulum">Kurikulum</option>
                </select>
            </div>

            <!-- Tombol Submit -->
            <div>
                <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition">
                    <i class="fas fa-plus mr-2"></i> Tambah Konten
                </button>
            </div>

        </form>
    </main>

    <!-- Navbar Bottom -->
    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-300 shadow-md">
        <ul class="flex justify-between">
            <li class="flex-1 text-center py-2">
                <a href="index.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-xs mt-1">Home</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="search.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-search text-xl"></i>
                    <span class="text-xs mt-1">Search</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="add.html" class="flex flex-col items-center text-blue-500">
                    <i class="fas fa-plus-circle text-2xl"></i>
                    <span class="text-xs mt-1">Add</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="notifications.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="text-xs mt-1">Notifications</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="profile.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-user text-xl"></i>
                    <span class="text-xs mt-1">Profile</span>
                </a>
            </li>
        </ul>
    </nav>

</body>

</html>
