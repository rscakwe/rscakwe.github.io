<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Header -->
    <div class="text-center mb-6 w-full max-w-md">
        <i class="fas fa-key text-4xl text-blue-500 mb-2"></i>
        <h1 class="text-2xl font-bold text-gray-800">Lupa Password</h1>
        <p class="text-sm text-gray-500">Masukkan email Anda untuk menerima link reset password</p>
    </div>

    <!-- Form Forgot Password -->
    <form class="w-full max-w-md space-y-4">

        <!-- Email -->
        <div>
            <label for="email" class="block text-gray-700 mb-1">Email</label>
            <input type="email" id="email" placeholder="Masukkan email"
                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Tombol Kirim -->
        <div>
            <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition">
                <i class="fas fa-paper-plane mr-2"></i> Kirim Link Reset
            </button>
        </div>

    </form>

    <!-- Link ke Login -->
    <div class="mt-4 text-center text-sm text-gray-500 w-full max-w-md">
        Ingat password Anda? <a href="login.html" class="text-blue-500 hover:underline">Masuk</a>
    </div>

</body>

</html>
