<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register KTP Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100 flex flex-col items-center justify-start min-h-screen p-4">

    <!-- Header -->
    <div class="text-center mb-6 w-full max-w-md">
        <i class="fas fa-user-plus text-4xl text-blue-500 mb-2"></i>
        <h1 class="text-2xl font-bold text-gray-800">Daftar</h1>
        <p class="text-sm text-gray-500">Isi data seperti KTP untuk membuat akun baru</p>
    </div>

    <!-- Form Register -->
    <form class="w-full max-w-md space-y-4">

        <!-- NIK -->
        <div>
            <label for="nik" class="block text-gray-700 mb-1">NIK</label>
            <input type="text" id="nik" placeholder="Masukkan NIK"
                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Nama Lengkap -->
        <div>
            <label for="name" class="block text-gray-700 mb-1">Nama Lengkap</label>
            <input type="text" id="name" placeholder="Masukkan nama lengkap"
                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Tempat & Tanggal Lahir -->
        <div class="flex space-x-2">
            <div class="w-1/2">
                <label for="birthplace" class="block text-gray-700 mb-1">Tempat Lahir</label>
                <input type="text" id="birthplace" placeholder="Kota/Kabupaten"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div class="w-1/2">
                <label for="birthdate" class="block text-gray-700 mb-1">Tanggal Lahir</label>
                <input type="date" id="birthdate"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
        </div>

        <!-- Jenis Kelamin -->
        <div>
            <label class="block text-gray-700 mb-1">Jenis Kelamin</label>
            <div class="flex items-center space-x-4">
                <label class="flex items-center space-x-1">
                    <input type="radio" name="gender" value="Laki-laki" class="text-blue-500">
                    <span>Laki-laki</span>
                </label>
                <label class="flex items-center space-x-1">
                    <input type="radio" name="gender" value="Perempuan" class="text-blue-500">
                    <span>Perempuan</span>
                </label>
            </div>
        </div>

        <!-- Alamat -->
        <div>
            <label for="address" class="block text-gray-700 mb-1">Alamat</label>
            <textarea id="address" placeholder="Masukkan alamat lengkap"
                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <!-- Email -->
        <div>
            <label for="email" class="block text-gray-700 mb-1">Email</label>
            <input type="email" id="email" placeholder="Masukkan email"
                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Password -->
        <div>
            <label for="password" class="block text-gray-700 mb-1">Password</label>
            <input type="password" id="password" placeholder="Masukkan password"
                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Konfirmasi Password -->
        <div>
            <label for="confirm_password" class="block text-gray-700 mb-1">Konfirmasi Password</label>
            <input type="password" id="confirm_password" placeholder="Konfirmasi password"
                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Tombol Daftar -->
        <div>
            <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition">
                <i class="fas fa-user-plus mr-2"></i> Daftar
            </button>
        </div>
    </form>

    <!-- Link ke Login -->
    <div class="mt-4 text-center text-sm text-gray-500 w-full max-w-md">
        Sudah punya akun? <a href="login.html" class="text-blue-500 hover:underline">Masuk</a>
    </div>

</body>

</html>
