<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Orang Tua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-blue-50 flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Header -->
    <div class="text-center mb-6 w-full max-w-md">
        <i class="fas fa-users text-4xl text-blue-500 mb-2"></i>
        <h1 class="text-2xl font-bold text-gray-800">Daftar Orang Tua</h1>
        <p class="text-sm text-gray-700">Isi formulir berikut untuk membuat akun orang tua</p>
    </div>

    <!-- Form Registrasi -->
    <form id="registerForm" class="w-full max-w-md space-y-4">
        <div>
            <label class="block text-gray-800 mb-1">Nama Lengkap</label>
            <input type="text" id="name" placeholder="Masukkan nama lengkap"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 bg-blue-50"
                required>
        </div>

        <div>
            <label class="block text-gray-800 mb-1">Email</label>
            <input type="email" id="email" placeholder="Masukkan email"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 bg-blue-50"
                required>
        </div>

        <div>
            <label class="block text-gray-800 mb-1">Password</label>
            <input type="password" id="password" placeholder="Masukkan password"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 bg-blue-50"
                required>
        </div>

        <div>
            <label class="block text-gray-800 mb-1">Konfirmasi Password</label>
            <input type="password" id="confirmPassword" placeholder="Ulangi password"
                class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 bg-blue-50"
                required>
        </div>

        <button type="submit"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white p-3 rounded font-semibold transition">
            Daftar
        </button>
    </form>

    <!-- Link Login -->
    <div class="mt-4 text-center text-sm text-gray-700 w-full max-w-md">
        <p>Sudah punya akun? <a href="login.html" class="text-blue-600 hover:underline">Masuk</a></p>
    </div>

    <!-- Script penyimpanan di localStorage -->
    <script>
        const parentList = JSON.parse(localStorage.getItem('parentList')) || [];

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const role = "parent";

            if (!name || !email || !password || !confirmPassword) {
                alert('Semua field wajib diisi!');
                return;
            }

            if (password !== confirmPassword) {
                alert('Password dan Konfirmasi Password tidak cocok!');
                return;
            }

            const exists = parentList.find(parent => parent.email === email);
            if (exists) {
                alert('Email sudah terdaftar!');
                return;
            }

            parentList.push({ name, email, password, role });
            localStorage.setItem('parentList', JSON.stringify(parentList));

            alert('Berhasil mendaftar!');
            window.location.href = 'login.html';

            this.reset();
        });
    </script>

</body>

</html>
