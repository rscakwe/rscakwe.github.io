<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Kelas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-4 bg-blue-500 text-white shadow-md">
        <h1 class="text-xl font-bold">Edit Kelas</h1>
        <p class="text-sm">Ubah data kelas sesuai kebutuhan</p>
    </header>

    <!-- Form Edit Kelas -->
    <main class="flex-1 p-4 pb-20">
        <form class="space-y-4" id="editForm">

            <!-- Nama Kelas -->
            <div>
                <label for="class_name" class="block text-gray-700 mb-1">Nama Kelas</label>
                <input type="text" id="class_name"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Wali Kelas -->
            <div>
                <label for="teacher" class="block text-gray-700 mb-1">Wali Kelas</label>
                <input type="text" id="teacher"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Jumlah Murid -->
            <div>
                <label for="students" class="block text-gray-700 mb-1">Jumlah Murid</label>
                <input type="number" id="students"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Level -->
            <div>
                <label for="level" class="block text-gray-700 mb-1">Level</label>
                <select id="level"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Pilih level</option>
                    <option value="SD">SD</option>
                    <option value="SMP">SMP</option>
                    <option value="SMA">SMA</option>
                </select>
            </div>

            <!-- Tombol Simpan -->
            <div>
                <button type="submit"
                    class="w-full bg-green-500 text-white p-3 rounded-lg hover:bg-green-600 transition">
                    <i class="fas fa-save mr-2"></i> Simpan Perubahan
                </button>
            </div>

        </form>
    </main>

    <!-- Navbar Bottom -->
    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-300 shadow-md">
        <ul class="flex justify-between">
            <li class="flex-1 text-center py-2">
                <a href="../index.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-xs mt-1">Beranda</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="#" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-search text-xl"></i>
                    <span class="text-xs mt-1">Cari</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="create.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-plus-circle text-2xl"></i>
                    <span class="text-xs mt-1">Tambah</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="../notifications.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="text-xs mt-1">Notifikasi</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="../profile.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-user text-xl"></i>
                    <span class="text-xs mt-1">Profil</span>
                </a>
            </li>
        </ul>
    </nav>

    <script>
        // Ambil id dari URL
        const params = new URLSearchParams(window.location.search);
        const classId = params.get('id');

        // Ganti path ke file JSON kelas kamu
        fetch('../../assets/json/classes.json')
            .then(res => res.json())
            .then(data => {
                const cls = data.find(c => c.id == classId);
                if (!cls) return;

                document.getElementById('class_name').value = cls.name;
                document.getElementById('teacher').value = cls.teacher;
                document.getElementById('students').value = cls.students;
                document.getElementById('level').value = cls.level;
            })
            .catch(err => console.error('Error loading class data:', err));

        // Event simpan perubahan (contoh log ke console)
        document.getElementById('editForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const updatedClass = {
                id: classId,
                name: document.getElementById('class_name').value,
                teacher: document.getElementById('teacher').value,
                students: document.getElementById('students').value,
                level: document.getElementById('level').value
            };

            console.log('Data kelas diperbarui:', updatedClass);
            alert('Perubahan kelas berhasil disimpan (simulasi)');
        });
    </script>

</body>

</html>
