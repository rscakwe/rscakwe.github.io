<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Rapor</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100">

    <!-- ================= HEADER ================= -->
    <header class="p-4 bg-blue-500 text-white shadow relative flex items-center">

        <!-- Back -->
        <a href="index.html" class="text-xl z-10">
            <i class="fas fa-arrow-left"></i>
        </a>

        <!-- Title -->
        <h1 class="absolute left-1/2 transform -translate-x-1/2 text-lg font-semibold">
            Pilih Rapor
        </h1>

    </header>

    <!-- ================= CONTENT ================= -->
    <div class="p-4 space-y-4">

        <!-- Judul Section -->
        <h2 class="text-gray-700 font-semibold">
            Menu Rapor
        </h2>

        <!-- Card Tengah Semester -->
        <a href="raport-tengah.html"
            class="w-full bg-white rounded-xl shadow p-4 flex items-center gap-4 active:scale-95 transition">

            <div class="bg-blue-100 text-blue-500 p-3 rounded-lg text-xl">
                <i class="fas fa-file-lines"></i>
            </div>

            <div class="flex-1">
                <h3 class="font-semibold text-gray-800">
                    Rapor Tengah Semester
                </h3>
                <p class="text-sm text-gray-500">
                    Lihat nilai tengah semester
                </p>
            </div>

            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

        <!-- Card Akhir Semester -->
        <a href="raport-akhir.html"
            class="w-full bg-white rounded-xl shadow p-4 flex items-center gap-4 active:scale-95 transition">

            <div class="bg-green-100 text-green-500 p-3 rounded-lg text-xl">
                <i class="fas fa-graduation-cap"></i>
            </div>

            <div class="flex-1">
                <h3 class="font-semibold text-gray-800">
                    Rapor Akhir Semester
                </h3>
                <p class="text-sm text-gray-500">
                    Lihat nilai akhir semester
                </p>
            </div>

            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

    </div>

</body>

</html>
