<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-4 bg-white shadow-md flex items-center">
        <img src="https://placehold.co/60" alt="Foto Profil" class="w-16 h-16 rounded-full mr-4" id="profilePhoto">
        <div>
            <h1 class="text-xl font-bold text-gray-800" id="userName">Nama User</h1>
            <p class="text-sm text-gray-500" id="userEmail">email@example.com</p>
            <p class="text-xs text-gray-400" id="userRole">Role: murid</p>
        </div>
    </header>

    <!-- Menu Profile -->
    <main class="flex-1 p-4 overflow-y-auto">
        <ul class="space-y-3">

            <li>
                <a href="#" class="flex items-center p-4 bg-white rounded-lg shadow hover:bg-blue-50 transition">
                    <i class="fas fa-user-edit text-blue-500 text-xl mr-4"></i>
                    <span class="text-gray-800 font-medium">Edit Profil</span>
                </a>
            </li>

            <li>
                <a href="#" class="flex items-center p-4 bg-white rounded-lg shadow hover:bg-blue-50 transition">
                    <i class="fas fa-cog text-green-500 text-xl mr-4"></i>
                    <span class="text-gray-800 font-medium">Pengaturan</span>
                </a>
            </li>

            <li>
                <a href="auth/login.html"
                    class="flex items-center p-4 bg-white rounded-lg shadow hover:bg-red-50 transition" id="logoutBtn">
                    <i class="fas fa-sign-out-alt text-red-500 text-xl mr-4"></i>
                    <span class="text-gray-800 font-medium">Logout</span>
                </a>
            </li>

        </ul>
    </main>

    <!-- Navbar Bottom -->
    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-300 shadow-md">
        <ul class="flex justify-between">
            <li class="flex-1 text-center py-2">
                <a href="index.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-xs mt-1">Home</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="search.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-search text-xl"></i>
                    <span class="text-xs mt-1">Search</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="add.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-plus-circle text-2xl"></i>
                    <span class="text-xs mt-1">Add</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="notifications.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="text-xs mt-1">Notifications</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="profile.html" class="flex flex-col items-center text-blue-500">
                    <i class="fas fa-user text-xl"></i>
                    <span class="text-xs mt-1">Profile</span>
                </a>
            </li>
        </ul>
    </nav>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // ===== CEK LOGIN =====
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (!isLoggedIn || isLoggedIn !== "true") {
                window.location.href = "auth/login.html";
                return;
            }

            // Ambil data user dari localStorage
            const userName = localStorage.getItem('userName') || 'Nama User';
            const userEmail = localStorage.getItem('userEmail') || 'email@example.com';
            const userRole = localStorage.getItem('currentUserRole') || 'murid';

            document.getElementById('userName').innerText = userName;
            document.getElementById('userEmail').innerText = userEmail;
            document.getElementById('userRole').innerText = `Role: ${userRole}`;

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.clear();
                window.location.href = "auth/login.html";
            });
        });
    </script>

</body>

</html>
