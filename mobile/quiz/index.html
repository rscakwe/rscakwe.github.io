<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Test</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-100">

    <!-- ================= HEADER ================= -->
    <nav class="bg-blue-600 shadow-md py-3 px-6 flex items-center justify-between sticky top-0 z-10">
        <button onclick="window.history.back()" class="text-white hover:text-gray-200 flex items-center">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="text-xl font-semibold text-white text-center flex-1">Quiz</h1>
        <div class="w-6"></div>
    </nav>

    <!-- ================= CONTENT ================= -->
    <div class="p-4 space-y-4">

        <h2 class="text-gray-700 font-semibold">Available Tests</h2>

        <!-- DAILY TEST -->
        <a href="daily-test.html"
            class="flex items-center gap-4 bg-white p-4 rounded-xl shadow active:scale-95 transition">

            <div class="bg-yellow-100 text-yellow-500 p-3 rounded-lg text-xl">
                <i class="fas fa-pencil"></i>
            </div>

            <div class="flex-1">
                <h3 class="font-semibold text-gray-800">Daily Test</h3>
                <p class="text-sm text-gray-500">5 practice questions for daily exercises</p>
            </div>

            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

        <!-- MIDTERM TEST -->
        <a href="midterm-test.html"
            class="flex items-center gap-4 bg-white p-4 rounded-xl shadow active:scale-95 transition">

            <div class="bg-blue-100 text-blue-500 p-3 rounded-lg text-xl">
                <i class="fas fa-file-lines"></i>
            </div>

            <div class="flex-1">
                <h3 class="font-semibold text-gray-800">Midterm Test</h3>
                <p class="text-sm text-gray-500">40 questions for midterm assessment</p>
            </div>

            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

        <!-- FINAL TEST -->
        <a href="final-test.html"
            class="flex items-center gap-4 bg-white p-4 rounded-xl shadow active:scale-95 transition">

            <div class="bg-green-100 text-green-500 p-3 rounded-lg text-xl">
                <i class="fas fa-graduation-cap"></i>
            </div>

            <div class="flex-1">
                <h3 class="font-semibold text-gray-800">Final Test</h3>
                <p class="text-sm text-gray-500">40 questions for end-of-semester assessment</p>
            </div>

            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

    </div>

</body>

</html>
