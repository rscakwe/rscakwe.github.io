<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-4 bg-blue-500 text-white shadow-md">
        <h1 class="text-xl font-bold">Edit Sekolah</h1>
        <p class="text-sm">Ubah data sekolah di bawah</p>
    </header>

    <!-- Form Edit Sekolah -->
    <main class="flex-1 p-4 pb-20">
        <form class="space-y-4">

            <!-- Nama Sekolah -->
            <div>
                <label for="school_name" class="block text-gray-700 mb-1">Nama Sekolah</label>
                <input type="text" id="school_name" placeholder="Masukkan nama sekolah"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value="SMP Negeri 1 Jakarta" />
            </div>

            <!-- Alamat Sekolah -->
            <div>
                <label for="address" class="block text-gray-700 mb-1">Alamat</label>
                <input type="text" id="address" placeholder="Masukkan alamat sekolah"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value="Jl. Merdeka No.1, Jakarta" />
            </div>

            <!-- Kota -->
            <div>
                <label for="city" class="block text-gray-700 mb-1">Kota</label>
                <input type="text" id="city" placeholder="Masukkan kota"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value="Jakarta" />
            </div>

            <!-- Provinsi -->
            <div>
                <label for="province" class="block text-gray-700 mb-1">Provinsi</label>
                <input type="text" id="province" placeholder="Masukkan provinsi"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value="DKI Jakarta" />
            </div>

            <!-- Nomor Telepon -->
            <div>
                <label for="phone" class="block text-gray-700 mb-1">Nomor Telepon</label>
                <input type="tel" id="phone" placeholder="Masukkan nomor telepon"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value="021-1234567" />
            </div>

            <!-- Tombol Simpan Perubahan -->
            <div>
                <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition">
                    <i class="fas fa-save mr-2"></i> Simpan Perubahan
                </button>
            </div>

        </form>
    </main>

    <!-- Navbar Bottom -->
    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-300 shadow-md">
        <ul class="flex justify-between">
            <li class="flex-1 text-center py-2">
                <a href="../index.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-xs mt-1">Beranda</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="#" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-search text-xl"></i>
                    <span class="text-xs mt-1">Cari</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="create.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-plus-circle text-2xl"></i>
                    <span class="text-xs mt-1">Tambah</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="../notifications.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="text-xs mt-1">Notifikasi</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="../profile.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-user text-xl"></i>
                    <span class="text-xs mt-1">Profil</span>
                </a>
            </li>
        </ul>
    </nav>

</body>

</html>
