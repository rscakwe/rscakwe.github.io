<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Mata Pelajaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-4 bg-blue-500 text-white shadow-md">
        <h1 class="text-xl font-bold">Edit Mata Pelajaran</h1>
        <p class="text-sm">Ubah data mata pelajaran di bawah</p>
    </header>

    <!-- Form -->
    <main class="flex-1 p-4 pb-20">
        <form id="editForm" class="space-y-4">

            <!-- Nama Mata Pelajaran -->
            <div>
                <label class="block text-gray-700 mb-1">Nama Mata Pelajaran</label>
                <input type="text" id="subjectName"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Kode Mata Pelajaran -->
            <div>
                <label class="block text-gray-700 mb-1">Kode Mata Pelajaran</label>
                <input type="text" id="subjectCode"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Guru Pengampu -->
            <div>
                <label class="block text-gray-700 mb-1">Guru Pengampu</label>
                <input type="text" id="subjectTeacher"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Tombol -->
            <div>
                <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition">
                    <i class="fas fa-save mr-2"></i> Simpan Perubahan
                </button>
            </div>

        </form>
    </main>

    <!-- Navbar -->
    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-300 shadow-md">
        <ul class="flex justify-between">
            <li class="flex-1 text-center py-2">
                <a href="../../index.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-xs mt-1">Beranda</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="#" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-search text-xl"></i>
                    <span class="text-xs mt-1">Cari</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="create-subject.html" class="flex flex-col items-center text-blue-500">
                    <i class="fas fa-plus-circle text-2xl"></i>
                    <span class="text-xs mt-1">Tambah</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="../../notifications.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="text-xs mt-1">Notifikasi</span>
                </a>
            </li>
            <li class="flex-1 text-center py-2">
                <a href="../../profile.html" class="flex flex-col items-center text-gray-600 hover:text-blue-500">
                    <i class="fas fa-user text-xl"></i>
                    <span class="text-xs mt-1">Profil</span>
                </a>
            </li>
        </ul>
    </nav>

    <script>
        // Ambil ID dari URL
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        let subjects = JSON.parse(localStorage.getItem('subjects')) || [];

        // Cari mata pelajaran
        const subject = subjects.find(item => item.id == id);

        // Isi form
        if (subject) {
            document.getElementById('subjectName').value = subject.name;
            document.getElementById('subjectCode').value = subject.code;
            document.getElementById('subjectTeacher').value = subject.teacher;
        }

        // Submit update
        document.getElementById('editForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const updatedSubject = {
                id: subject.id,
                name: document.getElementById('subjectName').value,
                code: document.getElementById('subjectCode').value,
                teacher: document.getElementById('subjectTeacher').value
            };

            subjects = subjects.map(item => item.id == id ? updatedSubject : item);

            localStorage.setItem('subjects', JSON.stringify(subjects));

            alert('Mata pelajaran berhasil diupdate!');
            window.location.href = 'index.html';
        });
    </script>

</body>

</html>
