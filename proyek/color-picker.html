<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>

<body class="bg-blue-50 min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Header -->
    <header class="mb-6 text-center">
        <h1 class="text-4xl font-bold text-blue-700 mb-2">
            <i class="fas fa-palette"></i> Color Picker
        </h1>
        <a href="../index.html" class="text-blue-700 hover:underline">
            <i class="fas fa-arrow-left"></i> Kembali ke Portfolio
        </a>
    </header>

    <!-- Card -->
    <div class="bg-white p-6 rounded-xl shadow w-full max-w-md text-center">

        <!-- Preview -->
        <div id="colorPreview" class="w-full h-40 rounded-lg mb-4 border" style="background-color: #3b82f6;">
        </div>

        <!-- Input Color -->
        <input type="color" id="colorInput" class="w-full h-12 border rounded mb-4 cursor-pointer" value="#3b82f6">

        <!-- HEX Code -->
        <div class="flex items-center justify-between bg-gray-100 p-3 rounded mb-4">
            <span id="hexCode" class="font-mono text-lg text-gray-700">#3b82f6</span>
            <button id="copyBtn" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 text-sm">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>

        <!-- RGB Display -->
        <div id="rgbCode" class="text-gray-600 text-sm">
            rgb(59, 130, 246)
        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        $(document).ready(function () {

            function hexToRgb(hex) {
                let r = parseInt(hex.substring(1, 3), 16);
                let g = parseInt(hex.substring(3, 5), 16);
                let b = parseInt(hex.substring(5, 7), 16);
                return `rgb(${r}, ${g}, ${b})`;
            }

            $('#colorInput').on('input', function () {
                let color = $(this).val();

                $('#colorPreview').css('background-color', color);
                $('#hexCode').text(color);
                $('#rgbCode').text(hexToRgb(color));
            });

            $('#copyBtn').click(function () {
                let hex = $('#hexCode').text();

                navigator.clipboard.writeText(hex).then(() => {
                    $(this).text('Copied!');
                    setTimeout(() => {
                        $(this).html('<i class="fas fa-copy"></i> Copy');
                    }, 1500);
                });
            });

        });
    </script>

</body>

</html>
