<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Digital</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>

<body class="bg-blue-50 min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Header -->
    <header class="mb-6 text-center">
        <h1 class="text-4xl font-bold text-blue-700 mb-2"><i class="fas fa-clock"></i> Jam Digital</h1>
        <a href="../index.html" class="text-blue-700 hover:underline"><i class="fas fa-arrow-left"></i> Kembali ke
            Portfolio</a>
    </header>

    <!-- Display Jam -->
    <div class="text-center">
        <div id="digitalClock" class="text-6xl font-mono text-blue-800"></div>
        <div id="date" class="text-xl text-blue-700 mt-2"></div>
    </div>

    <!-- jQuery Script -->
    <script>
        $(document).ready(function () {

            function updateClock() {
                let now = new Date();
                let h = now.getHours().toString().padStart(2, '0');
                let m = now.getMinutes().toString().padStart(2, '0');
                let s = now.getSeconds().toString().padStart(2, '0');
                let timeString = h + ':' + m + ':' + s;
                $('#digitalClock').text(timeString);

                let options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                $('#date').text(now.toLocaleDateString('id-ID', options));
            }

            // Update setiap detik
            setInterval(updateClock, 1000);
            updateClock(); // Jalankan langsung saat load
        });
    </script>

</body>

</html>
