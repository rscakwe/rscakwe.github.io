<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>

<body class="bg-blue-50 min-h-screen flex flex-col items-center p-6">

    <!-- Header -->
    <header class="mb-6 text-center">
        <h1 class="text-4xl font-bold text-blue-700 mb-2"><i class="fas fa-calculator"></i> Kalkulator Sederhana</h1>
        <a href="../index.html" class="text-blue-700 hover:underline"><i class="fas fa-arrow-left"></i> Kembali ke
            Portfolio</a>
    </header>

    <!-- Kalkulator -->
    <div class="w-full max-w-md">
        <input type="text" id="display"
            class="w-full mb-4 text-right text-2xl p-2 border border-blue-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="0" disabled>

        <div class="grid grid-cols-4 gap-2">
            <!-- Baris 1 -->
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="7">7</button>
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="8">8</button>
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="9">9</button>
            <button class="calc-btn bg-blue-600 text-white hover:bg-blue-700 py-2 rounded" data-value="/">/</button>

            <!-- Baris 2 -->
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="4">4</button>
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="5">5</button>
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="6">6</button>
            <button class="calc-btn bg-blue-600 text-white hover:bg-blue-700 py-2 rounded" data-value="*">*</button>

            <!-- Baris 3 -->
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="1">1</button>
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="2">2</button>
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="3">3</button>
            <button class="calc-btn bg-blue-600 text-white hover:bg-blue-700 py-2 rounded" data-value="-">-</button>

            <!-- Baris 4 -->
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value="0">0</button>
            <button class="calc-btn bg-blue-100 hover:bg-blue-200 py-2 rounded" data-value=".">.</button>
            <button id="equals" class="bg-green-500 text-white hover:bg-green-600 py-2 rounded"><i
                    class="fas fa-equals"></i></button>
            <button class="calc-btn bg-blue-600 text-white hover:bg-blue-700 py-2 rounded" data-value="+">+</button>

            <!-- Baris 5 -->
            <button id="clear" class="col-span-4 bg-red-500 text-white hover:bg-red-600 py-2 rounded"><i
                    class="fas fa-trash"></i> Clear</button>
        </div>
    </div>

    <!-- jQuery Script -->
    <script>
        $(document).ready(function () {
            let current = "";

            $('.calc-btn').click(function () {
                current += $(this).data('value');
                $('#display').val(current);
            });

            $('#equals').click(function () {
                try {
                    let result = eval(current);
                    $('#display').val(result);
                    current = result.toString();
                } catch {
                    $('#display').val("Error");
                    current = "";
                }
            });

            $('#clear').click(function () {
                current = "";
                $('#display').val("");
            });
        });
    </script>

</body>

</html>
