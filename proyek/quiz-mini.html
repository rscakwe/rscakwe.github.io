<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Mini</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>

<body class="bg-blue-50 min-h-screen flex flex-col items-center p-6">

    <!-- Header -->
    <header class="mb-6 text-center">
        <h1 class="text-4xl font-bold text-blue-700 mb-2"><i class="fas fa-question-circle"></i> Quiz Mini</h1>
        <a href="../index.html" class="text-blue-700 hover:underline"><i class="fas fa-arrow-left"></i> Kembali ke
            Portfolio</a>
    </header>

    <!-- Quiz Container -->
    <div class="w-full max-w-xl">
        <div id="quizContent" class="mb-4 text-blue-800 text-lg"></div>
        <div id="options" class="grid grid-cols-1 gap-2 mb-4"></div>
        <button id="nextBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"><i
                class="fas fa-arrow-right"></i> Next</button>
        <div id="score" class="mt-4 text-xl font-bold text-blue-700"></div>
    </div>

    <!-- jQuery Script -->
    <script>
        $(document).ready(function () {
            const quiz = [
                {
                    question: "Ibukota Indonesia?",
                    options: ["Jakarta", "Bandung", "Surabaya", "Yogyakarta"],
                    answer: "Jakarta"
                },
                {
                    question: "Bahasa pemrograman untuk web?",
                    options: ["Python", "JavaScript", "C++", "Ruby"],
                    answer: "JavaScript"
                },
                {
                    question: "1 + 1 = ?",
                    options: ["1", "2", "3", "4"],
                    answer: "2"
                }
            ];

            let currentIndex = 0;
            let score = 0;

            function showQuestion(index) {
                let q = quiz[index];
                $('#quizContent').text(q.question);
                $('#options').empty();
                q.options.forEach(option => {
                    let btn = $('<button class="bg-blue-100 hover:bg-blue-200 py-2 px-3 rounded text-left w-full">' + option + '</button>');
                    btn.click(function () {
                        if (option === q.answer) score++;
                        currentIndex++;
                        if (currentIndex < quiz.length) {
                            showQuestion(currentIndex);
                        } else {
                            $('#quizContent').hide();
                            $('#options').hide();
                            $('#nextBtn').hide();
                            $('#score').text("Skor Anda: " + score + " / " + quiz.length);
                        }
                    });
                    $('#options').append(btn);
                });
            }

            showQuestion(currentIndex);

            $('#nextBtn').click(function () {
                // Next button tidak dibutuhkan karena klik opsi langsung lanjut
            });
        });
    </script>

</body>

</html>
