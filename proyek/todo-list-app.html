<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>

<body class="bg-blue-50 min-h-screen flex flex-col items-center p-6">

    <!-- Header -->
    <header class="mb-6 text-center">
        <h1 class="text-4xl font-bold text-blue-700 mb-2"><i class="fas fa-list-check"></i> Todo List App</h1>
        <a href="../index.html" class="text-blue-700 hover:underline"><i class="fas fa-arrow-left"></i> Kembali ke
            Portfolio</a>
    </header>

    <!-- Input Field dan Button -->
    <div class="flex mb-4 w-full max-w-md">
        <input id="todoInput" type="text" placeholder="Masukkan tugas..."
            class="flex-1 border border-blue-300 rounded-l px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button id="addBtn" class="bg-blue-600 text-white px-4 py-2 rounded-r hover:bg-blue-700">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- List Tugas -->
    <ul id="todoList" class="w-full max-w-md space-y-2">
        <!-- Item baru muncul di sini -->
    </ul>

    <!-- jQuery Script -->
    <script>
        $(document).ready(function () {

            function addTask() {
                let task = $('#todoInput').val().trim();
                if (task !== '') {
                    let li = $('<li class="flex justify-between items-center bg-blue-100 px-3 py-2 rounded shadow-sm border border-blue-200"></li>');
                    li.append('<span class="text-blue-800">' + task + '</span>');
                    let delBtn = $('<button class="text-red-600 hover:text-red-800 ml-2"><i class="fas fa-trash"></i></button>');
                    delBtn.click(function () { li.remove(); });
                    li.append(delBtn);
                    $('#todoList').append(li);
                    $('#todoInput').val('');
                }
            }

            // Klik tombol tambah
            $('#addBtn').click(addTask);

            // Enter key untuk tambah tugas
            $('#todoInput').keypress(function (e) {
                if (e.which == 13) { addTask(); }
            });

        });
    </script>

</body>

</html>
